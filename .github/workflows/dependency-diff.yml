name: Ontology dependency diff

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to access base commit

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install strix-roost
        run: | 
          LATEST_TAG=$(curl -s https://api.github.com/repos/scientific-ontology-network/strix-roost/releases/latest | jq -r .tag_name)
          echo "Latest strix-roost release: $LATEST_TAG"
          curl -L \
            "https://github.com/scientific-ontology-network/strix-roost/releases/download/v0.1.2/strix-roost-linux-gnu.tar.gz" \
            | tar xz
          chmod +x strix-roost
          sudo mv strix-roost /usr/local/bin/

      # -------------------------
      # Run on BASE (old ontology)
      # -------------------------
      - name: Checkout base commit
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
      
      - name: Compute annotations
        run: |
          strix-roost --in-path pizza.owl annotations --out-path anno.json
      
      - name: Compute dependencies (old)
        run: |
          strix-roost --in-path pizza.owl dependency --cause-limit 0 --method "empty" --out-path deps-old.json
          jq -r 'map_values(keys)' deps-old.json > deps-old-keys.json

      - name: Generate jquery labeler
        run: |
          cat << EOF > labeler.jq
          def label_for(\$k): 
              (\$f[0][\$k].labels? // {} | to_entries) as \$labels
              | (
                  \$labels[]
                  | select(.value.type == "language" and .value.lang == "en")
                  | .value.literal
                ) // (
                  \$labels[]
                  | select(.value.type == "simple")
                  | .value.literal
                ) // \$k;

          def relabel:
            if type == "object" then
              with_entries(
                .key |= label_for(.)
                | .value |= relabel
              )
            elif type == "array" then
              map(relabel)
            elif type == "string" then
              label_for(.)
            else
              .
            end;

          relabel
          EOF

      - name: Replace with labels (old)
        run: |
          jq --slurpfile f anno.json -f labeler.jq deps-old-keys.json > deps-old-labeled.json

      - name: Sort dependencies (old)
        run: |
          jq -S . deps-old-labeled.json > deps-old.sorted.json

      # -------------------------
      # Run on PR (new ontology)
      # -------------------------
      - name: Checkout PR commit
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}

      - name: Compute dependencies (new)
        run: |
          strix-roost --in-path pizza.owl dependency --method "empty" --cause-limit 0 --out-path deps-new.json
          jq -r 'map_values(keys)' deps-new.json > deps-new-keys.json

     

      - name: Replace with labels (new)
        run: |
          jq --slurpfile f anno.json -f labeler.jq deps-new-keys.json > deps-new-labeled.json

      - name: Sort dependencies (new)
        run: |
          jq -S . deps-new-labeled.json > deps-new.sorted.json


      # -------------------------
      # Diff
      # -------------------------
      - name: Generate diff
        run: |
          jq -n --slurpfile a deps-old-labeled.json --slurpfile b deps-new-labeled.json '
          def set: unique;

          ((($a[0] | keys) + ($b[0] | keys)) | unique) as $keys
          | {
            left_but_not_right: (
              reduce $keys[] as $k ({}; 
                ($a[0][$k] // []) as $av
                | ($b[0][$k] // []) as $bv
                | (($av | set) - ($bv | set)) as $diff
                | if ($diff | length > 0) then .[$k] = $diff else . end
              )
            ),

            right_but_not_left: (
              reduce $keys[] as $k ({}; 
                ($b[0][$k] // []) as $bv
                | ($a[0][$k] // []) as $av
                | (($bv | set) - ($av | set)) as $diff
                | if ($diff | length > 0) then .[$k] = $diff else . end
              )
            )
          }
          ' > diff.json
      
      - name: Publish dependency diff to job summary
        run: |
          touch $GITHUB_STEP_SUMMARY
          jq -r '
          .left_but_not_right
          | to_entries[]
          | "## Removed\n<details>\n<summary>\(.key)</summary>\n\n<ul>" +
            (.value | map("<li> \(.)</li>") | join("\n")) +
            "\n</ul></details>\n"
          ' diff.json >> $GITHUB_STEP_SUMMARY
          jq -r '
          .right_but_not_left
          | to_entries[]
          | "## Added\n<details>\n<summary>\(.key)</summary>\n\n<ul>" +
            (.value | map("<li>\(.)</li>") | join("\n")) +
            "\n</ul></details>\n"
          ' diff.json >>  $GITHUB_STEP_SUMMARY

      - name: Comment link to full diff
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 📦 Ontology dependency diff

            The full dependency diff is available in the workflow run summary:

            [View full diff](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
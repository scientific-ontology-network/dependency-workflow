name: Ontology dependency diff

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to access base commit

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install strix-roost
        run: | 
          LATEST_TAG=$(curl -s https://api.github.com/repos/scientific-ontology-network/strix-roost/releases/latest | jq -r .tag_name)
          echo "Latest strix-roost release: $LATEST_TAG"
          curl -L \
            "https://github.com/scientific-ontology-network/strix-roost/releases/download/v0.1.1/strix-roost-linux-gnu.tar.gz" \
            | tar xz
          chmod +x strix-roost
          sudo mv strix-roost /usr/local/bin/

      # -------------------------
      # Run on BASE (old ontology)
      # -------------------------
      - name: Checkout base commit
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: Compute dependencies (old)
        run: |
          strix-roost --in-path pizza.owl dependency --method "empty" --out-path deps-old.json
          jq -r 'map_values(keys)' deps-old.json > deps-old-keys.json
          jq -S . deps-old-keys.json > deps-old.sorted.json

      # -------------------------
      # Run on PR (new ontology)
      # -------------------------
      - name: Checkout PR commit
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}

      - name: Compute dependencies (new)
        run: |
          strix-roost --in-path pizza.owl dependency --method "empty" --out-path deps-new.json
          jq -r 'map_values(keys)' deps-new.json > deps-new-keys.json
          jq -S . deps-new-keys.json > deps-new.sorted.json

      - name: Compute annotations
        run: |
          strix-roost --in-path pizza.owl annotations --out-path anno.json

      # -------------------------
      # Diff
      # -------------------------
      - name: Generate diff
        run: |
          diff -u deps-old.sorted.json deps-new.sorted.json > deps.diff || true

      - name: Replace with labels
        run: |
          jq --slurpfile map anno.json '
            def label_for($k):
              ($map[0][$k].labels // {} | to_entries) as $labels
              | (
                  $labels[]
                  | select(.value.type == "language" and .value.lang == "en")
                  | .value.literal
                ) // (
                  $labels[]
                  | select(.value.type == "simple")
                  | .value.literal
                ) // $k;

            map_values(map(label_for(.)))
          ' deps.json

      - name: Publish dependency diff to job summary
        run: |
          touch $GITHUB_STEP_SUMMARY
          echo "## Ontology dependency diff" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`diff" >> $GITHUB_STEP_SUMMARY
          cat deps.diff >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Comment link to full diff
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 📦 Ontology dependency diff

            The full dependency diff is available in the workflow run summary:

            [View full diff](https://github.com/${{ github.repository }}/runs/${{ github.run_id }}?check_suite_focus=true)
